# TEMPORARY — worker-count benchmark for the e2e Ubuntu migration.
#
# Answers one question: what is the Playwright worker knee on a real
# ubuntu-latest runner? Local measurement said 4, but that was a 12-core Mac,
# and CI's runner has 4 cores — so the local curve cannot be extrapolated.
#
# Deliberately isolated from ci.yml: its own trigger, no coverage artifacts, no
# interaction with the coverage ratchet. DELETE THIS FILE before opening the
# real PR.
name: e2e worker benchmark (temporary)

on:
  push:
    branches: [perf/e2e-ubuntu-split]
  workflow_dispatch:

jobs:
  bench:
    name: chromium @ ${{ matrix.workers }} workers
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        workers: [2, 3, 4]

    steps:
      - uses: actions/checkout@v5

      - name: Report runner capacity
        run: |
          echo "nproc: $(nproc)"
          echo "mem:   $(free -g | awk '/^Mem:/{print $2}') GB"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # CI-faithful: coverage ON, since instrumentation is ~31% of wall time and
      # a no-coverage benchmark would measure a suite we do not actually run.
      - name: Run chromium project
        env:
          E2E_COVERAGE: '1'
        run: |
          start=$(date +%s)
          npx playwright test --project=chromium --workers=${{ matrix.workers }} --grep-invert "@macos-shortcuts"
          end=$(date +%s)
          echo "WORKERS=${{ matrix.workers }} SECONDS=$((end - start))"
          echo "### chromium @ ${{ matrix.workers }} workers: $((end - start))s" >> "$GITHUB_STEP_SUMMARY"
