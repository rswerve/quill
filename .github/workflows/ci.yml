name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Format check
        run: npx prettier --check .

      - name: Run tests
        run: npm run test:coverage:unit

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit/
          retention-days: 7

  e2e:
    name: End-to-end (Playwright)
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npm run test:coverage:e2e

      - name: Upload end-to-end coverage
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage
          path: coverage/e2e/
          retention-days: 7

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  coverage:
    name: Combined coverage
    needs: [frontend, e2e]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit

      - name: Download end-to-end coverage
        uses: actions/download-artifact@v4
        with:
          name: e2e-coverage
          path: coverage/e2e

      - name: Merge coverage
        run: npm run coverage:merge

      - name: Find baseline coverage run
        id: baseline
        uses: actions/github-script@v8
        with:
          script: |
            const baselineSha = context.eventName === 'pull_request'
              ? context.payload.pull_request.base.sha
              : context.payload.before;
            if (!baselineSha || /^0+$/.test(baselineSha)) {
              core.setFailed('Coverage regression gate has no baseline commit');
              return;
            }
            const { owner, repo } = context.repo;
            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci.yml',
              head_sha: baselineSha,
              status: 'success',
              per_page: 20,
            });
            const run = response.data.workflow_runs.find(candidate => candidate.event === 'push');
            if (!run) {
              core.setFailed(`No successful main CI run found for baseline ${baselineSha}`);
              return;
            }
            core.setOutput('sha', baselineSha);
            core.setOutput('run-id', String(run.id));

      - name: Download baseline coverage
        uses: actions/download-artifact@v4
        with:
          name: combined-coverage
          path: coverage/baseline
          github-token: ${{ github.token }}
          run-id: ${{ steps.baseline.outputs.run-id }}

      - name: Check for coverage regressions
        env:
          BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: npm run coverage:check

      - name: Publish coverage summary
        if: always()
        run: |
          cat coverage/combined/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          if [[ -f coverage/combined/coverage-regression.md ]]; then
            cat coverage/combined/coverage-regression.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload combined coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage
          path: coverage/combined/
          retention-days: 90

  rust:
    name: Rust (Tauri backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test
