name: Release

# Dormant, manually dispatched workflow retained for a future Developer ID release
# process. The live distribution path is a local universal build, a full bundle-level
# ad-hoc signature, and manual publication to Google Drive. This workflow's unsigned,
# per-architecture GitHub Release artifacts are not what Quill ships today.
#
# Releases are macOS-only for now: the @claude integration (Claude CLI
# discovery and session lookup) is Unix-path-based and untested elsewhere,
# and we don't ship builds that can't deliver the full experience.
#
# The macOS bundles are unsigned — no Apple Developer certificate is wired in —
# so on first launch Gatekeeper makes users approve the app via System Settings →
# Privacy & Security → Open Anyway (the right-click → Open shortcut was removed in
# macOS Sequoia). This is documented in the README and the user guide.

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }}${{ matrix.args && format(' {0}', matrix.args) || '' }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and attach installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quill ${{ github.ref_name }}'
          releaseDraft: true
          releaseBody: |
            Download the installer for your platform from the assets below.
            macOS builds are unsigned. On first launch, double-click the app,
            click **Done**, then open **System Settings → Privacy & Security**
            and click **Open Anyway** (the right-click → Open shortcut was
            removed in macOS Sequoia). See the README's install section for details.
          args: ${{ matrix.args }}
